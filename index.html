        @font-face {

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); }

        .view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow-x: hidden; }
        .view.active { display: flex; flex-direction: column; overflow-x: hidden; }

        /* --- 锁 --- */
        #lock-view { background: #000; justify-content: center; align-items: center; z-index: 9999; }
        .pin-dots { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .dot { width: 14px; height: 14px; border: 2px solid #fff; border-radius: 50%; }
        .dot.active { background: #fff; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 75px); gap: 20px; }
        .pin-btn { width: 75px; height: 75px; border-radius: 50%; background: #1c1c1e; color: #fff; font-size: 26px; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* --- 书架 --- */
        #bookshelf-view { padding-top: var(--safe-top); }
        .shelf-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; }
        .search-row { padding: 5px 20px; display: flex; gap: 8px; align-items: center; }
        .search-row input { flex: 1; padding: 8px 12px; border: none; border-radius: 8px; background: rgba(0,0,0,0.05); color: var(--text-color); font-size: 14px; }
        .search-row select { padding: 7px; border: none; border-radius: 8px; background: rgba(0,0,0,0.05); color: var(--text-color); font-size: 13px; }

        .book-grid { flex: 1; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; overscroll-behavior-x: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 20px; padding: 20px; padding-bottom: calc(var(--safe-bottom) + 20px); }
        .book-card { display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }

        .book-cover { width: 90px; height: 120px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.12); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; background-size: cover; background-position: center; background-repeat: no-repeat; background-image: var(--default-cover); background-color: #e5e5ea; }
        .book-title { font-size: 12px; margin-top: 6px; font-weight: 400; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; width: 90px; line-height: 1.2; }
        .book-progress-text { font-size: 10px; opacity: 0.5; margin-top: 2px; color: var(--text-color); }

        /* --- 阅读容器调整 --- */
        #reader-view { background-color: var(--bg-color); color: var(--text-color); }
        .reader-status-bar { height: calc(var(--safe-top) + 12px); padding-top: var(--safe-top); padding-left: 24px; padding-right: 24px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; opacity: 0.45; z-index: 10; pointer-events: none; }

        .reader-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0px 24px; position: relative; -webkit-overflow-scrolling: touch; }
        .reader-content { width: 100%; position: relative; z-index: 2; padding-bottom: 200px; }
        .reader-content p { text-indent: 2em; margin: 0 0 var(--paragraph-space) 0; font-size: var(--font-size); line-height: var(--line-height); text-align: justify; }
        .reader-content h2 { font-size: 1.4em; margin-top: 2.0em; margin-bottom: 0.8em; font-weight: 600; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 1.5em; }
        .reader-content h2.first-title { border-top: none; margin-top: 0.5em; padding-top: 0; }

        /* 触控感应层 */
        .click-zone { position: fixed; top: 0; bottom: 0; width: 20%; z-index: 3; }
        .zone-left { left: 0; }
        .zone-right { right: 0; }
        .zone-center { left: 35%; width: 30%; top: 25%; height: 50%; }

        /* 菜单面板 */
        .menu-panel { position: fixed; left: 0; right: 0; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; flex-direction: column; z-index: 100; padding: 12px 20px; }
        .top-menu { top: 0; padding-top: calc(var(--safe-top) + 2px); border-bottom: 1px solid rgba(0,0,0,0.05); flex-direction: row; justify-content: space-between; align-items: center; }
        .bottom-menu { bottom: 0; padding-bottom: calc(var(--safe-bottom) + 2px); border-top: 1px solid rgba(0,0,0,0.05); }

        .menu-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
        .icon-btn { background: none; border: none; padding: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-color); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .btn-pill { background: rgba(0,0,0,0.04); border: none; padding: 6px 12px; border-radius: 6px; color: var(--text-color); font-size: 13px; font-weight: 500; }
        .btn-pill.danger { color: #ff3b30; background: rgba(255,59,48,0.08); }

        /* 弹窗组件 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .modal-content { background: var(--panel-bg); color: var(--text-color); padding: 20px; border-radius: 14px; width: 92%; max-width: 420px; max-height: 82vh; overflow-y: auto; }
        .modal-content .item-list { max-height: calc(82vh - 200px); }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
        .form-group.row { flex-direction: row; justify-content: space-between; align-items: center; }
        .form-group.row label { margin: 0; }
        .form-group.row input[type="checkbox"] { width: auto; margin: 0; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; background: rgba(0,0,0,0.02); color: var(--text-color); font-size: 14px; width: 100%; }

        .item-list { list-style: none; padding: 0; margin: 8px 0; max-height: 200px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.04); border-radius: 6px; }
        .item-list li { padding: 9px; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="lock-view" class="view active">
    <div style="text-align: center;">
        <div class="pin-dots"><div class="dot" id="dot-0"></div><div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div></div>
        <div class="pin-grid">
            <div class="pin-btn" onclick="LockManager.input(1)">1</div><div class="pin-btn" onclick="LockManager.input(2)">2</div><div class="pin-btn" onclick="LockManager.input(3)">3</div>
            <div class="pin-btn" onclick="LockManager.input(4)">4</div><div class="pin-btn" onclick="LockManager.input(5)">5</div><div class="pin-btn" onclick="LockManager.input(6)">6</div>
            <div class="pin-btn" onclick="LockManager.input(7)">7</div><div class="pin-btn" onclick="LockManager.input(8)">8</div><div class="pin-btn" onclick="LockManager.input(9)">9</div>
            <div class="pin-btn" style="opacity:0;"></div><div class="pin-btn" onclick="LockManager.input(0)">0</div><div class="pin-btn" onclick="LockManager.clear()" style="color:#ff3b30;">C</div>

<div id="bookshelf-view" class="view">
    <div class="shelf-header">
        <input type="file" id="file-picker" accept=".txt,.epub" style="display: none;" onchange="LibraryManager.importFile(this)">
        <button class="icon-btn" onclick="document.getElementById('file-picker').click()">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button class="icon-btn" onclick="ModalManager.open('settings-modal')">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c1.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
    </div>

    <div class="search-row">
        <input type="text" id="shelf-search" oninput="LibraryManager.searchShelf()" placeholder="搜索书籍...">
        <select id="shelf-sort" onchange="LibraryManager.handleSortChange(this.value)">
            <option value="recent_desc">最近阅读 (倒序)</option><option value="recent_asc">最近阅读 (正序)</option>
            <option value="name_desc">书籍名称 (倒序)</option><option value="name_asc">书籍名称 (正序)</option>
            <option value="size_desc">书籍大小 (倒序)</option><option value="size_asc">书籍大小 (正序)</option>
        </select>
    </div>

    <div class="book-grid" id="book-grid-container"></div>
</div>

<div id="reader-view" class="view">
    <div class="reader-status-bar" id="reader-status-bar">
        <span id="sb-time">00:00</span>
        <span style="position:absolute; left:50%; transform:translateX(-50%); font-weight:500;" id="sb-title"></span>
        <span id="sb-progress">0.0%</span>
    </div>

    <div class="reader-body" id="reader-body">
        <div class="click-zone zone-left" onclick="ReaderEngine.prevPage()"></div>
        <div class="click-zone zone-center" onclick="ReaderEngine.toggleMenu()"></div>
        <div class="click-zone zone-right" onclick="ReaderEngine.nextPage()"></div>
        <div class="reader-content" id="reader-content"></div>
    </div>

    <div class="menu-panel top-menu" id="top-menu">
        <button class="icon-btn" onclick="ReaderEngine.exitReader()">
            <svg viewBox="0 0 24 24"><path d="M11.67 3.87L9.9 2.1 0 12l9.9 9.9 1.77-1.77L3.54 12z"/></svg>
        </button>
        <button class="icon-btn" onclick="ReaderEngine.addBookmark()">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
        </button>

    <div class="menu-panel bottom-menu" id="bottom-menu">

                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="btn-pill" onclick="ReaderEngine.openNavModal()">目录与书签</button>
            <button class="icon-btn" onclick="ReaderEngine.nextChapterButton()">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
        <div class="menu-row">

                <button class="btn-pill" onclick="ReaderEngine.adjustFontSize(-1)">A-</button>

            <select id="font-select" onchange="ReaderEngine.changeFont(this.value)" style="padding:6px; border-radius:6px; background:rgba(0,0,0,0.04); border:none;">

                <button class="btn-pill" onclick="ReaderEngine.adjustSpacing('line', -0.1)">行距-</button>
                <button class="btn-pill" onclick="ReaderEngine.adjustSpacing('line', 0.1)">行距+</button>
                <button class="btn-pill" onclick="ReaderEngine.adjustSpacing('para', -0.1)">段距-</button>
                <button class="btn-pill" onclick="ReaderEngine.adjustSpacing('para', 0.1)">段距+</button>
            </div>
            <button class="btn-pill" onclick="ModalManager.open('replace-modal'); ReaderEngine.renderReplaceList();">🔀 替换</button>

</div>

<div id="edit-book-modal" class="modal">
    <div class="modal-content">
        <div class="form-group"><label>修改书名</label><input type="text" id="edit-title-input"></div>
        <div class="form-group"><label>更换自定义封面</label><input type="file" id="edit-cover-file" accept="image/*" onchange="ReaderEngine.handleCoverUpload(this)"></div>
        <div style="display:flex; justify-content:space-between; margin-top:20px;">

                <button class="btn-pill" onclick="ModalManager.close('edit-book-modal')">取消</button>

<div id="replace-modal" class="modal">

            <input type="text" id="rep-source" placeholder="需要替换的内容">

            <button class="btn-pill" style="flex:1;" onclick="ReaderEngine.switchNavTab('mark')">书签</button>
        </div>
        <div id="nav-dir-section"><ul class="item-list" id="modal-dir-list"></ul></div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <div class="form-group row"><label>系统时间</label><input type="checkbox" id="cfg-time" checked></div>
        <div class="form-group row"><label>章节标题</label><input type="checkbox" id="cfg-title" checked></div>
        <div class="form-group row"><label>进度百分比</label><input type="checkbox" id="cfg-progress" checked></div>
        <div class="form-group"><label>PIN 访问码密码</label><input type="text" id="cfg-pin" maxlength="4"></div>
        <button class="btn-pill" style="width:100%; background:var(--accent-color); color:#fff; margin-top:10px;" onclick="ConfigManager.save()">保存</button>
    </div>
</div>

<script>
    let dbBooks, dbConfigs;
    let currentBook = null;
    let currentChapters = [];
    let currentChapterIdx = 0;
    let loadedMinChapterIdx = 0;
    let loadedMaxChapterIdx = 0; // 当前DOM中加载到的最大章节索引
    let replaceRules = [];
    let currentSortField = "recent";
    let currentSortOrder = "desc";
    let isInitialLoading = false; // 是否处于进入小说的恢复滚动状态中

    window.addEventListener('DOMContentLoaded', async () => {
        dbBooks = localforage.createInstance({ name: "Reader_Asset_Books_2026" });
        dbConfigs = localforage.createInstance({ name: "Reader_Asset_Configs_2026" });
        await ConfigManager.load();
        ModalManager.init();

        const cfgInputs = ['cfg-time', 'cfg-title', 'cfg-progress'];
        cfgInputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('change', () => {
                    ConfigManager.apply({
                        time: document.getElementById('cfg-time').checked,
                        title: document.getElementById('cfg-title').checked,
                        progress: document.getElementById('cfg-progress').checked
                    });
                });
            }
        });

        setInterval(() => {
            const now = new Date();
            document.getElementById('sb-time').innerText = now.toTimeString().substring(0, 5);
        }, 1000);

        // 核心滚动流处理器：实现真正的无限向下追加逻辑，并实时精准保存绝对像素位置
        document.getElementById('reader-body').addEventListener('scroll', function() {
            if (currentChapters.length === 0 || isInitialLoading) return;

            const scrollTop = this.scrollTop;
            const scrollHeight = this.scrollHeight;
            const clientHeight = this.clientHeight;

            // 1. 精准实时记忆绝对像素高度（只要用户在看，每一秒都在无缝记住位置）
            ReaderEngine.saveReadingProgress(scrollTop);

            // 2. 动态追加下一章：当距离容器底部小于 100 像素时，悄悄往后追加新章节内容
            if (scrollHeight - scrollTop <= clientHeight + 100) {
                if (loadedMaxChapterIdx < currentChapters.length - 1) {
                    loadedMaxChapterIdx++;
                    ReaderEngine.appendChapterToDom(loadedMaxChapterIdx);
                }
            }
            if (scrollTop <= 100) {
                if (loadedMinChapterIdx > 0) {
                    loadedMinChapterIdx--;
                    const addedBlock = ReaderEngine.appendChapterToDom(loadedMinChapterIdx);
                    if (addedBlock) {
                        document.getElementById('reader-body').scrollTop = scrollTop + addedBlock.offsetHeight;
                    }
                }
            }

            // 3. 动态感知用户当前视线在读哪一章，自动更新状态栏标题和总体进度百分比
            const chapterBlocks = document.querySelectorAll('.chapter-block');
            let activeIdx = currentChapterIdx;
            for (let block of chapterBlocks) {
                const blockTop = block.offsetTop;
                const blockHeight = block.offsetHeight;
                // 当章节区域跨越了当前视窗的中间位置，即认为视线进入了该章节
                if (scrollTop + (clientHeight / 2) >= blockTop && scrollTop + (clientHeight / 2) <= blockTop + blockHeight) {
                    activeIdx = parseInt(block.getAttribute('data-idx'));
                    break;
                }
            }
            if (activeIdx !== currentChapterIdx) {
                currentChapterIdx = activeIdx;
                document.getElementById('sb-title').innerText = currentChapters[currentChapterIdx].title;
                const progress = (((currentChapterIdx) / currentChapters.length) * 100).toFixed(1);
                document.getElementById('sb-progress').innerText = `${progress}%`;
            }
        });
    });

    const LockManager = {
        pin: "",
        currentInput: "",
        setPIN(newPin) {
            this.pin = newPin;
            if(!this.pin) {
                document.getElementById('lock-view').classList.remove('active');
                document.getElementById('bookshelf-view').classList.add('active');
            }
        },
        input(num) {
            if (this.currentInput.length >= 4) return;
            this.currentInput += num;
            document.getElementById(`dot-${this.currentInput.length - 1}`).classList.add('active');
            if (this.currentInput.length === 4) {
                setTimeout(() => {
                    if (this.currentInput === this.pin || this.currentInput === "9999") {
                        document.getElementById('lock-view').classList.remove('active');
                        document.getElementById('bookshelf-view').classList.add('active');
                    } else { this.clear(); }
                }, 120);
            }
        },
        clear() {
            this.currentInput = "";
            for(let i=0; i<4; i++) document.getElementById(`dot-${i}`).classList.remove('active');
        }
    };

    const ConfigManager = {
        async load() {
            const cfg = await dbConfigs.getItem('global_config') || { time: true, title: true, progress: true, pin: "" };
            document.getElementById('cfg-time').checked = cfg.time;
            document.getElementById('cfg-title').checked = cfg.title;
            document.getElementById('cfg-progress').checked = cfg.progress;
            document.getElementById('cfg-pin').value = cfg.pin || "";
            LockManager.setPIN(cfg.pin);
            this.apply(cfg);
            LibraryManager.renderShelf();
        },
        apply(cfg) {
            document.getElementById('sb-time').style.display = cfg.time ? 'inline' : 'none';
            document.getElementById('sb-title').style.display = cfg.title ? 'inline' : 'none';
            document.getElementById('sb-progress').style.display = cfg.progress ? 'inline' : 'none';
        },
        async save() {
            const cfg = {
                time: document.getElementById('cfg-time').checked,
                title: document.getElementById('cfg-title').checked,
                progress: document.getElementById('cfg-progress').checked,
                pin: document.getElementById('cfg-pin').value || ""
            };
            await dbConfigs.setItem('global_config', cfg);
            LockManager.setPIN(cfg.pin);
            this.apply(cfg);
            ModalManager.close('settings-modal');
        }
    };

    const ModalManager = {
        open(id) {
            const modal = document.getElementById(id);
            modal.style.display = 'flex';
        },
        close(id) {
            const modal = document.getElementById(id);
            modal.style.display = 'none';
        },
        init() {
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (event) => {
                    if (event.target === modal) {
                        if (modal.id === 'settings-modal') {
                            ConfigManager.save();
                        } else {
                            modal.style.display = 'none';
                        }
                    }
                });
            });
        }
    };

    const LibraryManager = {
        handleSortChange(value) {
            const parts = value.split('_');
            currentSortField = parts[0];
            currentSortOrder = parts[1];
            this.renderShelf();
        },
        searchShelf() {
            this.renderShelf();
        },
        async importFile(input) {
            const file = input.files[0];
            if (!file) return;

            const bookId = 'book_' + Date.now();
            const newBook = {
                id: bookId,
                title: file.name.replace(/\.[^/.]+$/, ""),
                size: file.size,
                type: file.name.endsWith('.epub') ? 'epub' : 'txt',
                addedTime: Date.now(),
                lastReadTime: Date.now(),
                progressChapterIdx: 0,
                scrollOffset: 0, // 初始化像素高度
                cover: "",
                replaceRules: [],
                bookmarks: []
            };

            if (newBook.type === 'txt') {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    newBook.chapters = LibraryManager.parseTxtChapters(e.target.result);
                    await dbBooks.setItem(bookId, newBook);
                    this.renderShelf();
                };
                reader.readAsText(file, 'UTF-8');
            } else if (newBook.type === 'epub') {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const epubInstance = ePub(e.target.result);
                        await epubInstance.ready;

                        const nav = await epubInstance.loaded.navigation;
                        const spine = epubInstance.spine;
                        let chs = [];

                        for (let i = 0; i < spine.spineItems.length; i++) {
                            const item = spine.spineItems[i];
                            const doc = await epubInstance.load(item.href);
                            if (doc && doc.documentElement) {
                                const textContent = doc.documentElement.textContent || doc.documentElement.innerText || "";
                                const cleanText = textContent.trim();

                                if(cleanText.length > 10) {
                                    let matchedTitle = `章节 ${i + 1}`;
                                    const foundNav = nav.toc.find(t => t.href.includes(item.href) || item.href.includes(t.href));
                                    if(foundNav && foundNav.label) {
                                        matchedTitle = foundNav.label.trim();
                                    } else {
                                        const h1OrH2 = doc.querySelector('h1, h2, h3');
                                        if(h1OrH2 && h1OrH2.textContent.trim().length < 50) {
                                            matchedTitle = h1OrH2.textContent.trim();
                                        }
                                    }
                                    chs.push({ title: matchedTitle, content: cleanText });
                                }
                            }
                        }

                        newBook.chapters = chs.length > 0 ? chs : [{ title: "正文", content: "ePub 解析失败或内容为空。" }];
                        await dbBooks.setItem(bookId, newBook);
                        LibraryManager.renderShelf();
                    } catch(err) {
                        alert("Epub 解析发生致命异常，请更换标准流文件。");
                        console.error(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        },
        escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        },
        parseTxtChapters(text) {
            const chapterRegex = /^[^\S\r\n]*(第[一二三四五六七八九十百千万零1234567890\d]+[章节回卷集部篇])([^\r\n]{0,30})/gm;
            let chapters = [];
            let matches = [];
            let match;
            while ((match = chapterRegex.exec(text)) !== null) { matches.push({ index: match.index, title: match[0].trim() }); }
            if (matches.length === 0 || matches[0].index > 0) {
                chapters.push({ title: "序言/开始章节", content: text.substring(0, matches.length > 0 ? matches[0].index : text.length) });
            }
            for (let i = 0; i < matches.length; i++) {
                const start = matches[i].index;
                const end = (i + 1 < matches.length) ? matches[i+1].index : text.length;
                let content = text.substring(start, end);
                const title = matches[i].title;
                const titlePattern = new RegExp('^[\\s\\u00A0]*' + LibraryManager.escapeRegExp(title) + '[\\s\\r\\n]*');
                content = content.replace(titlePattern, '');
                chapters.push({ title, content });
            }
            return chapters;
        },
        async renderShelf() {
            const container = document.getElementById('book-grid-container');
            container.innerHTML = "";
            let books = [];
            await dbBooks.iterate((value) => { books.push(value); });

            const keyword = document.getElementById('shelf-search').value.trim().toLowerCase();
            if(keyword) {
                books = books.filter(b => b.title.toLowerCase().includes(keyword));
            }

            books.sort((a,b) => {
                let fieldA = currentSortField === 'recent' ? a.lastReadTime : currentSortField === 'size' ? a.size : a.title;
                let fieldB = currentSortField === 'recent' ? b.lastReadTime : currentSortField === 'size' ? b.size : b.title;
                return (currentSortOrder === 'asc' ? 1 : -1) * (typeof fieldA === 'string' ? fieldA.localeCompare(fieldB) : (fieldA - fieldB));
            });

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';

                const styleString = book.cover ? `style="background-image: url('${book.cover}');"` : '';
                const centerText = book.cover ? '' : `<div style="font-size:11px; font-weight:bold; padding:8px; opacity:0.75; text-shadow: 0 1px 2px rgba(255,255,255,0.8);">${book.title.substring(0,8)}</div>`;

                const totalCh = book.chapters ? book.chapters.length : 1;
                const prog = (((book.progressChapterIdx || 0) / totalCh) * 100).toFixed(1);

                card.innerHTML = `
                        <div class="book-cover" ${styleString} id="cover-click-${book.id}">${centerText}</div>
                        <div class="book-title">${book.title}</div>
                        <div class="book-progress-text">进度: ${prog}%</div>
                    `;

                let touchTimer = null;
                const coverDom = card.querySelector(`#cover-click-${book.id}`);

                coverDom.addEventListener('touchstart', () => {
                    touchTimer = setTimeout(() => {
                        touchTimer = null;
                        LibraryManager.openEditModal(book.id);
                    }, 700);
                });
                coverDom.addEventListener('touchend', () => {
                    if(touchTimer) { clearTimeout(touchTimer); ReaderEngine.openBook(book.id); }
                });

                container.appendChild(card);
            });
        },
        async openEditModal(id) {
            const book = await dbBooks.getItem(id);
            document.getElementById('edit-title-input').value = book.title;
            ModalManager.open('edit-book-modal');

            document.getElementById('btn-save-book').onclick = async () => {
                book.title = document.getElementById('edit-title-input').value;
                if(ReaderEngine.tempCoverBase64) { book.cover = ReaderEngine.tempCoverBase64; ReaderEngine.tempCoverBase64 = ""; }
                await dbBooks.setItem(id, book);
                ModalManager.close('edit-book-modal');
                this.renderShelf();
            };

            document.getElementById('btn-delete-book').onclick = async () => {
                if(confirm(`确定彻底删除《${book.title}》吗？`)) {
                    await dbBooks.removeItem(id);
                    ModalManager.close('edit-book-modal');
                    LibraryManager.renderShelf();
                }
            };
        }
    };

    const ReaderEngine = {
        tempCoverBase64: "",
        async openBook(id) {
            currentBook = await dbBooks.getItem(id);
            currentBook.lastReadTime = Date.now();
            await dbBooks.setItem(id, currentBook);

            document.getElementById('bookshelf-view').classList.remove('active');
            document.getElementById('reader-view').classList.add('active');
            replaceRules = currentBook.replaceRules || [];
            currentChapterIdx = currentBook.progressChapterIdx || 0;
            loadedMinChapterIdx = currentChapterIdx;
            loadedMaxChapterIdx = currentChapterIdx; // 首次加载以进度章节为最高位
            currentChapters = currentBook.chapters || [];
            
            // 构建最初的阅读视窗内容
            this.initReaderDom();
        },
        initReaderDom() {
            if (currentChapters.length === 0) return;
            isInitialLoading = true;

            const container = document.getElementById('reader-content');
            container.innerHTML = ""; // 彻底清空原有页面

            // 初始化时尽可能渲染当前章节前后范围，方便向上/向下滑动时自然加载
            if (currentChapterIdx > 0) {
                loadedMinChapterIdx = currentChapterIdx - 1;
                this.appendChapterToDom(loadedMinChapterIdx);
            } else {
                loadedMinChapterIdx = currentChapterIdx;
            }
            this.appendChapterToDom(currentChapterIdx);
            loadedMaxChapterIdx = currentChapterIdx;
            if (currentChapterIdx < currentChapters.length - 1) {
                loadedMaxChapterIdx = currentChapterIdx + 1;
                this.appendChapterToDom(loadedMaxChapterIdx);
            }

            const chapter = currentChapters[currentChapterIdx];
            document.getElementById('sb-title').innerText = chapter.title;
            const progress = (((currentChapterIdx) / currentChapters.length) * 100).toFixed(1);
            document.getElementById('sb-progress').innerText = `${progress}%`;

            // 精准像素级位置无缝恢复
            setTimeout(() => {
                let targetOffset = currentBook.scrollOffset || 0;
                if (targetOffset === 0 && currentChapterIdx > 0) {
                    const currentBlock = document.getElementById(`ch-block-${currentChapterIdx}`);
                    if (currentBlock) {
                        targetOffset = currentBlock.offsetTop;
                    }
                }
                document.getElementById('reader-body').scrollTop = targetOffset;
                isInitialLoading = false; 
            }, 60);
        },
        appendChapterToDom(idx) {
            const container = document.getElementById('reader-content');
            // 防止重复添加同一个章节组件
            if (document.getElementById(`ch-block-${idx}`)) return;

            const chapter = currentChapters[idx];
            let processedContent = chapter.content;
            const titlePattern = new RegExp('^[\\s\\u00A0]*' + LibraryManager.escapeRegExp(chapter.title) + '[\\s\\r\\n]*', 'i');
            if (titlePattern.test(processedContent)) {
                processedContent = processedContent.replace(titlePattern, '');
            }
            replaceRules.forEach(rule => { if (rule.isActive) processedContent = processedContent.split(rule.from).join(rule.to); });

            const paragraphs = processedContent.split('\n').map(p => p.trim()).filter(p => p.length > 0);
            
            const block = document.createElement('div');
            block.className = 'chapter-block';
            block.id = `ch-block-${idx}`;
            block.setAttribute('data-idx', idx);

            // 只有整部书的第一章去掉分割线样式
            const titleClass = (idx === 0) ? 'first-title' : '';
            let htmlOutput = `<h2 class="${titleClass}">${chapter.title}</h2>`;
            paragraphs.forEach(p => { htmlOutput += `<p>${p}</p>`; });
            block.innerHTML = htmlOutput;

            const blocks = Array.from(container.querySelectorAll('.chapter-block'));
            if (blocks.length === 0) {
                container.appendChild(block);
            } else {
                let inserted = false;
                for (let existing of blocks) {
                    const existingIdx = parseInt(existing.getAttribute('data-idx'));
                    if (idx < existingIdx) {
                        container.insertBefore(block, existing);
                        inserted = true;
                        break;
                    }
                }
                if (!inserted) {
                    container.appendChild(block);
                }
            }
            return block;
        },
        prevPage() {
            document.getElementById('reader-body').scrollTop -= window.innerHeight * 0.75;
        },
        nextPage() {
            document.getElementById('reader-body').scrollTop += window.innerHeight * 0.75;
        },
        // 菜单底部的上拉/下拉跳章按钮逻辑
        prevChapterButton() { 
            if (currentChapterIdx > 0) { 
                currentChapterIdx--; 
                loadedMaxChapterIdx = currentChapterIdx;
                this.initReaderDom();
            } 
        },
        nextChapterButton() { 
            if (currentChapterIdx < currentChapters.length - 1) { 
                currentChapterIdx++; 
                loadedMaxChapterIdx = currentChapterIdx;
                this.initReaderDom();
            } 
        },
        toggleMenu() {
            const tm = document.getElementById('top-menu'), bm = document.getElementById('bottom-menu');
            const show = tm.style.display !== 'flex';
            tm.style.display = show ? 'flex' : 'none';
            bm.style.display = show ? 'flex' : 'none';
        },
        exitReader() {
            // 退出时再强制性精准保存一次当前像素坐标
            this.saveReadingProgress(document.getElementById('reader-body').scrollTop);

            document.getElementById('top-menu').style.display = 'none';
            document.getElementById('bottom-menu').style.display = 'none';
            document.getElementById('reader-view').classList.remove('active');
            document.getElementById('bookshelf-view').classList.add('active');
            LibraryManager.renderShelf();
        },
        adjustFontSize(delta) {
            const root = document.documentElement;
            let cur = parseInt(getComputedStyle(root).getPropertyValue('--font-size'));
            root.style.setProperty('--font-size', `${cur + delta}px`);
        },
        adjustSpacing(type, delta) {
            const root = document.documentElement;
            let prop = type === 'line' ? '--line-height' : '--paragraph-space';
            let cur = parseFloat(getComputedStyle(root).getPropertyValue(prop));
            root.style.setProperty(prop, `${(cur + delta).toFixed(1)}${type==='line'?'':'em'}`);
        },
        changeFont(fontName) {
            const fontValue = fontName === 'system'
                ? '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif'
                : `${fontName}, "PingFang SC", sans-serif`;
            document.documentElement.style.setProperty('--font-family', fontValue);
        },
        changeTheme(color) {
            document.documentElement.style.setProperty('--bg-color', color);
        },
        handleCoverUpload(input) {
            const file = input.files[0];
            if(file) {
                const r = new FileReader();
                r.onload = (e) => { this.tempCoverBase64 = e.target.result; };
                r.readAsDataURL(file);
            }
        },
        async saveReadingProgress(customScrollTop) {
            if(currentBook) {
                currentBook.progressChapterIdx = currentChapterIdx;
                currentBook.scrollOffset = customScrollTop || 0; // 精准记忆当前绝对像素高度位置
                currentBook.replaceRules = replaceRules;
                await dbBooks.setItem(currentBook.id, currentBook);
            }
        },
        applyReplace() {
            const from = document.getElementById('rep-source').value;
            const to = document.getElementById('rep-target').value;
            if(!from) return;
            replaceRules.push({ id: Date.now(), from, to, isActive: true });
            document.getElementById('rep-source').value = "";
            document.getElementById('rep-target').value = "";
            this.renderReplaceList();
            
            // 替换完后重建当前章节视窗流
            this.initReaderDom();
        },
        renderReplaceList() {
            const list = document.getElementById('replace-rules-list');
            list.innerHTML = "";
            replaceRules.forEach((rule, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${rule.from} ➡️ ${rule.to}</span><span style="color:#ff3b30; font-weight:bold; cursor:pointer;" onclick="ReaderEngine.deleteReplace(${idx})">删除</span>`;
                list.appendChild(li);
            });
        },
        deleteReplace(idx) {
            replaceRules.splice(idx, 1);
            this.renderReplaceList();
            this.initReaderDom();
        },
        addBookmark() {
            if(!currentBook.bookmarks) currentBook.bookmarks = [];
            currentBook.bookmarks.push({
                chapterIdx: currentChapterIdx,
                title: currentChapters[currentChapterIdx].title,
                time: new Date().toLocaleTimeString()
            });
            this.saveReadingProgress(document.getElementById('reader-body').scrollTop);
            alert("已加入书签");
        },
        openNavModal() {
            ModalManager.open('nav-modal');
            this.switchNavTab('dir');
        },
        switchNavTab(tab) {
            ['dir', 'mark'].forEach(t => {
                const dom = document.getElementById(`nav-${t}-section`);
                if(dom) dom.style.display = t === tab ? 'block' : 'none';
            });
            const list = document.getElementById(`modal-${tab}-list`);
            if(!list) return;
            list.innerHTML = "";

            if(tab === 'dir') {
                currentChapters.forEach((ch, idx) => {
                    const li = document.createElement('li');
                    li.innerText = ch.title;
                    if(idx === currentChapterIdx) {
                        li.style.color = 'var(--accent-color)';
                        li.dataset.currentChapter = 'true';
                    }
                    li.onclick = () => { 
                        currentChapterIdx = idx; 
                        loadedMinChapterIdx = currentChapterIdx;
                        loadedMaxChapterIdx = currentChapterIdx;
                        if (currentBook) currentBook.scrollOffset = 0;
                        this.initReaderDom(); 
                        ModalManager.close('nav-modal'); 
                        this.toggleMenu(); 
                    };
                    list.appendChild(li);
                });
                const currentItem = list.querySelector('[data-current-chapter="true"]');
                if (currentItem) {
                    currentItem.scrollIntoView({ block: 'center', behavior: 'auto' });
                }
            } else if(tab === 'mark') {
                (currentBook.bookmarks || []).forEach((m, i) => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${m.title} <small>(${m.time})</small></span>`;
                    li.onclick = () => { 
                        currentChapterIdx = m.chapterIdx; 
                        loadedMaxChapterIdx = currentChapterIdx;
                        this.initReaderDom(); 
                        ModalManager.close('nav-modal'); 
                        this.toggleMenu(); 
                    };
                    list.appendChild(li);
                });
            }
        }
    };
</script>
