<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT 本地智能转 ePUB 工具</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #0071e3;
            --primary-hover: #0077ed;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: #d2d2d7;
            --danger-color: #ff453a;
            --danger-hover: #ff3b30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            max-width: 650px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; font-size: 22px; text-align: center; }
        .subtitle { font-size: 13px; color: var(--text-secondary); text-align: center; margin: -10px 0 20px 0; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
        input[type="text"], input[type="file"] {
            width: 100%; box-sizing: border-box; padding: 12px;
            border-radius: 8px; border: 1px solid var(--border-color); font-size: 15px;
        }
        input[type="text"]:focus { border-color: var(--primary-color); outline: none; }

        /* 动态替换规则样式区 */
        .replace-section {
            border-top: 1px solid #e5e5ea;
            margin-top: 20px;
            padding-top: 16px;
        }
        .replace-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .add-rule-btn {
            background: #e3f2fd; color: var(--primary-color); border: none;
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .add-rule-btn:hover { background: #d0e8ff; }
        .rule-list { margin-bottom: 16px; }
        .rule-item {
            display: flex; gap: 8px; margin-bottom: 8px; align-items: center; background: #fafafa; padding: 6px; border-radius: 8px; border: 1px solid #eee;
        }
        .rule-item input[type="text"] {
            flex: 1; padding: 8px 10px; font-size: 14px;
            border: 1px solid var(--border-color); border-radius: 6px; background: white;
        }
        .regex-toggle {
            display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; cursor: pointer; user-select: none;
        }
        .regex-toggle input { cursor: pointer; }
        .del-rule-btn {
            background: none; border: none; color: var(--danger-color);
            font-size: 22px; cursor: pointer; padding: 0 6px; line-height: 1;
        }
        .del-rule-btn:hover { color: var(--danger-hover); }

        .convert-btn {
            width: 100%; padding: 14px; background: var(--primary-color); color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .convert-btn:hover { background: var(--primary-hover); }
        .convert-btn:disabled { background: #999; cursor: not-allowed; }
        #status { text-align: center; color: var(--text-secondary); margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>TXT 本地智能转 ePUB 工具</h2>
    <div class="subtitle">支持自定义/默认封面 · 正则表达式清洗 · 离线纯本地</div>

    <div class="form-group">
        <label>书名</label>
        <input type="text" id="bookTitle" placeholder="选填，默认使用文件名">
    </div>
    <div class="form-group">
        <label>作者</label>
        <input type="text" id="bookAuthor" placeholder="选填">
    </div>
    <div class="form-group">
        <label>选择书籍封面（选填，不选则使用默认 cover.png）</label>
        <input type="file" id="coverFile" accept="image/png, image/jpeg">
    </div>
    <div class="form-group">
        <label>选择 TXT 小说文件</label>
        <input type="file" id="txtFile" accept=".txt">
    </div>

    <div class="replace-section">
        <div class="replace-header">
            <label style="margin-bottom: 0;">内容清洗 / 替换规则</label>
            <button type="button" class="add-rule-btn" id="addRuleBtn">+ 添加替换项</button>
        </div>
        <div class="rule-list" id="ruleList">
            <div class="rule-item">
                <input type="text" class="src-text" placeholder="匹配文本 / 正则表达式">
                <span style="color:var(--text-secondary)">→</span>
                <input type="text" class="dst-text" placeholder="替换为 (留空删除)">
                <label class="regex-toggle">
                    <input type="checkbox" class="is-regex"> 正则
                </label>
                <button type="button" class="del-rule-btn" onclick="removeRule(this)">×</button>
            </div>
        </div>
    </div>

    <button id="convertBtn" class="convert-btn" disabled>开始转换并下载</button>
    <div id="status">请先选择一个 TXT 文件</div>
</div>

<script>
    const txtFileInput = document.getElementById('txtFile');
    const coverFileInput = document.getElementById('coverFile');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const addRuleBtn = document.getElementById('addRuleBtn');
    const ruleList = document.getElementById('ruleList');

    txtFileInput.addEventListener('change', () => {
        convertBtn.disabled = !txtFileInput.files.length;
    });

    addRuleBtn.addEventListener('click', () => {
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <input type="text" class="src-text" placeholder="匹配文本 / 正则表达式">
            <span style="color:var(--text-secondary)">→</span>
            <input type="text" class="dst-text" placeholder="替换为 (留空删除)">
            <label class="regex-toggle">
                <input type="checkbox" class="is-regex"> 正则
            </label>
            <button type="button" class="del-rule-btn" onclick="removeRule(this)">×</button>
        `;
        ruleList.appendChild(item);
    });

    function removeRule(btn) {
        btn.parentElement.remove();
    }

    convertBtn.addEventListener('click', async () => {
        const file = txtFileInput.files[0];
        if (!file) return;

        const title = document.getElementById('bookTitle').value.trim() || file.name.replace('.txt', '');
        const author = document.getElementById('bookAuthor').value.trim() || '未知';

        statusDiv.innerText = '正在准备封面资源...';
        convertBtn.disabled = true;

        let coverBlob = null;
        let coverType = 'image/png';
        let coverExt = 'png';

        // 1. 获取封面逻辑：用户上传优先
        let originalCoverBlob = null;
        if (coverFileInput.files.length > 0) {
            originalCoverBlob = coverFileInput.files[0];
            coverType = originalCoverBlob.type;
            coverExt = originalCoverBlob.type === 'image/jpeg' ? 'jpg' : 'png';
        } else {
            try {
                let res = await fetch('cover.png');
                if (res.ok) {
                    originalCoverBlob = await res.blob();
                    coverType = 'image/png';
                    coverExt = 'png';
                    console.log("成功加载根目录默认保底封面。");
                }
            } catch (fetchErr) {
                console.log("未检测到默认封面文件，将生成无封面书籍。", fetchErr);
            }
        }

        // 【新增核心】如果获取到了封面，利用 Canvas 把书名和作者画上去
        if (originalCoverBlob) {
            statusDiv.innerText = '正在生成带书名的封面...';
            coverBlob = await drawTextOnCover(originalCoverBlob, title, author);
            // 经过 Canvas 处理后统一转为 png 格式更稳妥
            coverType = 'image/png';
            coverExt = 'png';
        }

        statusDiv.innerText = '正在读取并检测文本编码...';

        const reader = new FileReader();
        reader.onload = async function(e) {
            const arrayBuffer = e.target.result;

            // 编码检测
            let decoderStr = new TextDecoder('utf-8').decode(arrayBuffer);
            const isUtf8ReadyFailed = decoderStr.includes('\ufffd');

            if (isUtf8ReadyFailed) {
                statusDiv.innerText = '检测到标准 UTF-8 解码失败，正在使用 GBK 自动修复...';
                try {
                    decoderStr = new TextDecoder('gbk').decode(arrayBuffer);
                    console.log("已成功通过 GBK 重新构建文本。");
                } catch (gbkErr) {
                    statusDiv.innerText = 'GBK 自动修复失败，将退回 UTF-8 模式处理...';
                }
            } else {
                console.log("UTF-8 校验完全通过，无乱码占位符。");
            }

            let text = decoderStr;

            // 文本/正则清洗
            const ruleItems = document.querySelectorAll('.rule-item');
            let executedRulesCount = 0;

            ruleItems.forEach(item => {
                const srcVal = item.querySelector('.src-text').value;
                const dstVal = item.querySelector('.dst-text').value;
                const isRegex = item.querySelector('.is-regex').checked;

                if (srcVal) {
                    try {
                        let regex;
                        if (isRegex) {
                            regex = new RegExp(srcVal, 'g');
                        } else {
                            const escapedSrc = srcVal.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                            regex = new RegExp(escapedSrc, 'g');
                        }
                        if (regex.test(text)) {
                            text = text.replace(regex, dstVal);
                            executedRulesCount++;
                        }
                    } catch (regexErr) {
                        alert(`规则 [ ${srcVal} ] 存在正则表达式语法错误，已被略过！`);
                    }
                }
            });

            statusDiv.innerText = '正在切分章节...';

            // 智能正向切分章节
            const chapterRegex = /(^|\s)(第[0-9一二三四五六七八九十百千]+[章节卷回部折].*)/g;
            let chapters = [];
            let matches = [...text.matchAll(chapterRegex)];

            if (matches.length === 0) {
                chapters.push({ title: "正文", content: text });
            } else {
                if (matches[0].index > 0) {
                    chapters.push({ title: "序言", content: text.substring(0, matches[0].index) });
                }
                for (let i = 0; i < matches.length; i++) {
                    const start = matches[i].index;
                    const end = (i + 1 < matches.length) ? matches[i + 1].index : text.length;
                    const chapTitle = matches[i][2].trim();
                    const chapContent = text.substring(start + matches[i][0].length, end);
                    chapters.push({ title: chapTitle, content: chapContent });
                }
            }

            statusDiv.innerText = '正在本地打包包含封面的 ePUB...';
            try {
                await generateEpub(title, author, chapters, coverBlob, coverType, coverExt);
                statusDiv.innerText = '转换成功！已触发下载，请用苹果图书打开。';
            } catch (err) {
                statusDiv.innerText = '打包失败: ' + err.message;
            }
            convertBtn.disabled = false;
        };

        reader.readAsArrayBuffer(file);
    });

    // 动态为封面图片绘制书名和作者（支持长书名自动换行）
    function drawTextOnCover(imageBlob, title, author) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(imageBlob);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // 设定画布大小与原图一致，若读取不到则给定默认大图尺寸
                canvas.width = img.width || 600;
                canvas.height = img.height || 800;

                // 1. 绘制原封面背景
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // 2. 设置文字基础全局样式
                ctx.fillStyle = "#000"; // 文字颜色：白色
                ctx.shadowColor = "rgba(255, 255, 255, 0.7)"; // 增强阴影，防止白底看不清
                ctx.shadowBlur = 5;
                ctx.textAlign = "center";
                ctx.textBaseline = "top"; // 改为顶部对齐，方便多行排版计算

                // 3. 绘制书名（带自动换行逻辑）
                const titleFontSize = Math.floor(canvas.width * 0.12); // 书名大小自适应
                ctx.font = "bold " + titleFontSize + "px sans-serif";

                const maxWidth = canvas.width * 0.8; // 左右各留 10% 边距，文字区域占 80%
                const startX = canvas.width / 2;
                let startY = canvas.height * 0.4;   // 书名起始纵坐标
                const lineHeight = titleFontSize * 1.25; // 行高

                // 智能分行算法
                let lines = [];
                let currentLine = "";

                for (let i = 0; i < title.length; i++) {
                    let testLine = currentLine + title[i];
                    let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && i > 0) {
                        lines.push(currentLine);
                        currentLine = title[i];
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine); // 塞入最后一行

                // 循环绘制每一行书名
                lines.forEach((line) => {
                    ctx.fillText(line, startX, startY);
                    startY += lineHeight; // 纵坐标下移
                });

                // 4. 绘制作者（固定在画布靠下方 75% 的位置）
                const authorFontSize = Math.floor(canvas.width * 0.08);
                ctx.font = authorFontSize + "px sans-serif";
                ctx.shadowBlur = 3; // 作者名阴影微调

                const authorY = canvas.height * 0.75;
                ctx.fillText("作者：" + author, startX, authorY);

                // 5. 输出为新的 Blob 对象
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/png');
            };
            img.onerror = () => {
                // 如果图片加载失败，直接返回原图
                resolve(imageBlob);
            };
        });
    }

    // 动态为封面图片绘制书名和作者
    function drawTextOnCover2(imageBlob, title, author) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(imageBlob);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // 设定画布大小与原图一致
                canvas.width = img.width || 600;
                canvas.height = img.height || 800;

                // 1. 绘制原封面背景
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // 2. 设置文字基础样式（防止因图片底色太浅看不清，这里加一点微弱阴影）
                ctx.fillStyle = "#000"; // 文字颜色：白色
                ctx.shadowColor = "rgba(ff, ff, ff, 0.6)";
                ctx.shadowBlur = 6;
                ctx.textAlign = "center";

                // 3. 绘制书名（居中，靠上）
                ctx.font = "bold " + Math.floor(canvas.width * 0.15) + "px sans-serif"; // 字体大小根据宽度自适应
                ctx.fillText(title, canvas.width / 2, canvas.height * 0.45);

                // 4. 绘制作者（居中，靠下）
                ctx.font = Math.floor(canvas.width * 0.08) + "px sans-serif";
                ctx.shadowBlur = 4; // 作者名阴影小一点
                ctx.fillText(author, canvas.width / 2, canvas.height * 0.6);
                console.log(222222222)
                // 5. 输出为新的 Blob 对象
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/png');
            };
            img.onerror = () => {
                // 如果图片加载失败，直接返回原图
                resolve(imageBlob);
            };
        });
    }
    async function generateEpub(title, author, chapters, coverBlob, coverType, coverExt) {
        const zip = new JSZip();
        zip.file("mimetype", "application/epub+zip", { compression: "STORE" });

        const containerXml = `<?xml version="1.0" encoding="UTF-8"?>
    <container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
        <rootfiles>
            <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
        </rootfiles>
    </container>`;
        zip.folder("META-INF").file("container.xml", containerXml);

        const oebps = zip.folder("OEBPS");

        // 如果存在封面，将其塞入 OEBPS 目录
        if (coverBlob) {
            oebps.file(`cover.${coverExt}`, coverBlob);
        }

        let manifestItems = ''; let spineItems = ''; let ncxNavPoints = '';

        // 如果有封面，提前在清单中追加封面注册
        if (coverBlob) {
            manifestItems += `<item id="cover-image" href="cover.${coverExt}" media-type="${coverType}"/>\n`;
        }

        chapters.forEach((chap, index) => {
            const id = `chap_${index + 1}`;
            const filename = `${id}.xhtml`;

            const safeContent = chap.content
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .split('\n')
                .map(line => line.trim() ? `<p>  ${line.trim()}</p>` : '')
                .join('\n');

            const xhtml = `<?xml version="1.0" encoding="UTF-8"?>
    <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
    <html xmlns="http://www.w3.org/1999/xhtml" xml:lang="zh-CN">
    <head>
        <title>${chap.title}</title>
        <style type="text/css">
            h1 { text-align: center; margin-top: 2em; margin-bottom: 1em; font-size: 1.4em; }
            p { text-indent: 2em; line-height: 1.6; margin: 0.6em 0; font-size: 1.1em; }
        </style>
    </head>
    <body>
        <h1>${chap.title}</h1>
        ${safeContent}
    </body>
    </html>`;

            oebps.file(filename, xhtml);
            manifestItems += `<item id="${id}" href="${filename}" media-type="application/xhtml+xml"/>\n`;
            spineItems += `<itemref idref="${id}"/>\n`;
            ncxNavPoints += `<navPoint id="${id}" playOrder="${index + 1}"><navLabel><text>${chap.title}</text></navLabel><content src="${filename}"/></navPoint>\n`;
        });

        const tocNcx = `<?xml version="1.0" encoding="UTF-8"?>
    <ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
        <head>
            <meta name="dtb:uid" content="urn:uuid:txt2epub-${Date.now()}"/>
            <meta name="dtb:depth" content="1"/>
        </head>
        <docTitle><text>${title}</text></docTitle>
        <docAuthor><text>${author}</text></docAuthor>
        <navMap>${ncxNavPoints}</navMap>
    </ncx>`;
        oebps.file("toc.ncx", tocNcx);

        // 标准苹果图书封面 Meta 注册
        const coverMeta = coverBlob ? `<meta name="cover" content="cover-image"/>` : '';

        const contentOpf = `<?xml version="1.0" encoding="UTF-8"?>
    <package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" version="2.0">
        <metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf">
            <dc:title>${title}</dc:title>
            <dc:creator opf:role="aut">${author}</dc:creator>
            <dc:language>zh-CN</dc:language>
            <dc:identifier id="bookid">urn:uuid:txt2epub-${Date.now()}</dc:identifier>
            ${coverMeta}
        </metadata>
        <manifest>
            <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
            ${manifestItems}
        </manifest>
        <spine toc="ncx">${spineItems}</spine>
    </package>`;
        oebps.file("content.opf", contentOpf);

        const blob = await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
        saveAs(blob, `${title}.epub`);
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js', { scope: './' })
        .then(reg => console.log('TXT2ePUB Service Worker 注册成功:', reg.scope))
        .catch(err => console.log('注册失败:', err));
    }
</script>
</body>
</html>
