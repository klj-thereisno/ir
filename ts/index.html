<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TXT 本地智能转 ePUB 工具</title>
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #0071e3;
            --primary-hover: #0077ed;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: #d2d2d7;
            --danger-color: #ff453a;
            --danger-hover: #ff3b30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            max-width: 650px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; font-size: 22px; text-align: center; }
        .subtitle { font-size: 13px; color: var(--text-secondary); text-align: center; margin: -10px 0 20px 0; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
        input[type="text"], input[type="file"] {
            width: 100%; box-sizing: border-box; padding: 12px;
            border-radius: 8px; border: 1px solid var(--border-color); font-size: 15px;
        }
        input[type="text"]:focus { border-color: var(--primary-color); outline: none; }

        .replace-section {
            border-top: 1px solid #e5e5ea;
            margin-top: 20px;
            padding-top: 16px;
        }
        .replace-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .add-rule-btn {
            background: #e3f2fd; color: var(--primary-color); border: none;
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .add-rule-btn:hover { background: #d0e8ff; }
        .rule-list { margin-bottom: 16px; }
        .rule-item {
            display: flex; gap: 8px; margin-bottom: 8px; align-items: center; background: #fafafa; padding: 6px; border-radius: 8px; border: 1px solid #eee;
        }
        .rule-item input[type="text"] {
            flex: 1; padding: 8px 10px; font-size: 14px;
            border: 1px solid var(--border-color); border-radius: 6px; background: white;
        }
        .regex-toggle {
            display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; cursor: pointer; user-select: none;
        }
        .regex-toggle input { cursor: pointer; }
        .del-rule-btn {
            background: none; border: none; color: var(--danger-color);
            font-size: 22px; cursor: pointer; padding: 0 6px; line-height: 1;
        }
        .del-rule-btn:hover { color: var(--danger-hover); }

        .convert-btn {
            width: 100%; padding: 14px; background: var(--primary-color); color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .convert-btn:hover { background: var(--primary-hover); }
        .convert-btn:disabled { background: #999; cursor: not-allowed; }
        #status { text-align: center; color: var(--text-secondary); margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>TXT 本地智能转 ePUB 3.0 工具</h2>
    <div class="subtitle">完美修复 XML 闭合 Bug · 现代规范 HTML5 导航 · 苹果原生目录秒跳转</div>

    <div class="form-group">
        <label>书名</label>
        <input type="text" id="bookTitle" placeholder="选填，默认使用文件名" />
    </div>
    <div class="form-group">
        <label>作者</label>
        <input type="text" id="bookAuthor" placeholder="未知"/>
    </div>
    <div class="form-group">
        <label>选择书籍封面（选填，不选则无封面）</label>
        <input type="file" id="coverFile" accept="image/png, image/jpeg" />
    </div>
    <div class="form-group">
        <label>选择 TXT 小说文件</label>
        <input type="file" id="txtFile" accept=".txt" />
    </div>

    <div class="replace-section">
        <div class="replace-header">
            <label style="margin-bottom: 0;">内容清洗 / 替换规则</label>
            <button type="button" class="add-rule-btn" id="addRuleBtn">+ 添加替换项</button>
        </div>
        <div class="rule-list" id="ruleList">
            <div class="rule-item">
                <input type="text" class="src-text" placeholder="匹配文本 / 正则表达式" />
                <span style="color:var(--text-secondary)">→</span>
                <input type="text" class="dst-text" placeholder="替换为 (留空删除)" />
                <label class="regex-toggle">
                    <input type="checkbox" class="is-regex" /> 正则
                </label>
                <button type="button" class="del-rule-btn" onclick="removeRule(this)">×</button>
            </div>
        </div>
    </div>

    <button id="convertBtn" class="convert-btn" disabled="disabled">开始转换并下载</button>
    <div id="status">请先选择一个 TXT 文件</div>
</div>

<script>
    const txtFileInput = document.getElementById('txtFile');
    const coverFileInput = document.getElementById('coverFile');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const addRuleBtn = document.getElementById('addRuleBtn');
    const ruleList = document.getElementById('ruleList');

    txtFileInput.addEventListener('change', () => {
        convertBtn.disabled = !txtFileInput.files.length;
    });

    addRuleBtn.addEventListener('click', () => {
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <input type="text" class="src-text" placeholder="匹配文本 / 正则表达式" />
            <span style="color:var(--text-secondary)">→</span>
            <input type="text" class="dst-text" placeholder="替换为 (留空删除)" />
            <label class="regex-toggle">
                <input type="checkbox" class="is-regex" /> 正则
            </label>
            <button type="button" class="del-rule-btn" onclick="removeRule(this)">×</button>
        `;
        ruleList.appendChild(item);
    });

    function removeRule(btn) {
        btn.parentElement.remove();
    }

    // 智能封面绘制（支持长书名换行与楷体，高保真压缩）
    function drawTextOnCover(imageBlob, title, author) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(imageBlob);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width || 160;
                canvas.height = img.height || 240;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#000000";
                ctx.shadowColor = "rgb(255,255,255)";
                ctx.textAlign = "center";
                ctx.textBaseline = "top";

                const titleFontSize = Math.floor(canvas.width * 0.15);
                ctx.font = "bold " + titleFontSize + "px Kaiti, STKaiti, '华文楷体', serif";

                const maxWidth = canvas.width * 0.9;
                const startX = canvas.width / 2;
                let startY = canvas.height * 0.40;
                const lineHeight = titleFontSize * 1.25;

                let lines = [];
                let currentLine = "";
                for (let i = 0; i < title.length; i++) {
                    let testLine = currentLine + title[i];
                    let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && i > 0) {
                        lines.push(currentLine);
                        currentLine = title[i];
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine);
                lines.forEach((line) => {
                    ctx.fillText(line, startX, startY);
                    startY += lineHeight;
                });

                const authorFontSize = Math.floor(canvas.width * 0.08);
                ctx.font = authorFontSize + "px Kaiti, STKaiti, '华文楷体', serif";
                const authorY = canvas.height * 0.7;
                ctx.fillText(author, startX, authorY);

                let outputType = 'image/png';
                let quality = undefined;
                if (imageBlob.type === 'image/jpeg' || imageBlob.type === 'image/jpg') {
                    outputType = 'image/jpeg';
                    quality = 0.8;
                }
                canvas.toBlob((blob) => { resolve(blob); }, outputType, quality);
            };
            img.onerror = () => { resolve(imageBlob); };
        });
    }

    convertBtn.addEventListener('click', async () => {
        const file = txtFileInput.files[0];
        if (!file) return;

        const title = document.getElementById('bookTitle').value.trim() || file.name.replace('.txt', '');
        const author = document.getElementById('bookAuthor').value.trim() || '未知';

        statusDiv.innerText = '正在准备资源...';
        convertBtn.disabled = true;

        let rawCoverBlob = null;
        let coverType = 'image/png';
        let coverExt = 'png';

        if (coverFileInput.files.length > 0) {
            rawCoverBlob = coverFileInput.files[0];
            coverType = rawCoverBlob.type;
            coverExt = rawCoverBlob.type === 'image/jpeg' ? 'jpg' : 'png';
        }

        let finalCoverBlob = null;
        if (rawCoverBlob) {
            statusDiv.innerText = '正在绘制书名封面...';
            finalCoverBlob = await drawTextOnCover(rawCoverBlob, title, author);
            if (rawCoverBlob.type === 'image/jpeg' || rawCoverBlob.type === 'image/jpg') {
                coverType = 'image/jpeg';
                coverExt = 'jpg';
            }
        }

        statusDiv.innerText = '正在读取文本...';
        const reader = new FileReader();
        reader.onload = async function(e) {
            const arrayBuffer = e.target.result;
            let decoderStr = new TextDecoder('utf-8').decode(arrayBuffer);
            if (decoderStr.includes('\ufffd')) {
                try { decoderStr = new TextDecoder('gbk').decode(arrayBuffer); } catch(err){}
            }

            let text = decoderStr;

            // 洗稿规则
            const ruleItems = document.querySelectorAll('.rule-item');
            ruleItems.forEach(item => {
                const srcVal = item.querySelector('.src-text').value;
                const dstVal = item.querySelector('.dst-text').value;
                const isRegex = item.querySelector('.is-regex').checked;
                if (srcVal) {
                    try {
                        let regex = isRegex ? new RegExp(srcVal, 'g') : new RegExp(srcVal.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
                        text = text.replace(regex, dstVal);
                    } catch(e){}
                }
            });

            statusDiv.innerText = '正在智能切分章节...';
            const chapterRegex = /(^|\s)(第[0-9一二三四五六七八九十百千]+[章节卷回部折].*)/g;
            let chapters = [];
            let matches = [...text.matchAll(chapterRegex)];

            if (matches.length === 0) {
                chapters.push({ title: "正文", content: text });
            } else {
                if (matches[0].index > 0) {
                    chapters.push({ title: "序言", content: text.substring(0, matches[0].index) });
                }
                for (let i = 0; i < matches.length; i++) {
                    const start = matches[i].index;
                    const end = (i + 1 < matches.length) ? matches[i + 1].index : text.length;
                    const chapTitle = matches[i][2].trim();
                    const chapContent = text.substring(start + matches[i][0].length, end);
                    chapters.push({ title: chapTitle, content: chapContent });
                }
            }

            statusDiv.innerText = '正在构建完美校验级 ePUB 3.0 结构...';
            try {
                await generateStrictEpub3(title, author, chapters, finalCoverBlob, coverType, coverExt);
                statusDiv.innerText = '打包成功！已保存到您的下载目录。';
            } catch (err) {
                statusDiv.innerText = '打包失败: ' + err.message;
            }
            convertBtn.disabled = false;
        };
        reader.readAsArrayBuffer(file);
    });

    function escapeXml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    // 核心安全重构：彻底解决苹果图书 XML 自闭合报错 Bug
    async function generateStrictEpub3(title, author, chapters, coverBlob, coverType, coverExt) {
        const zip = new JSZip();
        const uuid = `urn:uuid:${'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        })}`;

        // 1. mimetype (必须独立存储 STORE 且不压缩)
        zip.file("mimetype", "application/epub+zip", { compression: "STORE" });

        // 2. 完美的元容器，注意 XML 自闭合
        const containerXml = `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
    <rootfiles>
        <rootfile full-path="content.opf" media-type="application/oebps-package+xml"/>
    </rootfiles>
</container>`;
        zip.folder("META-INF").file("container.xml", containerXml);

        // 创建你要求的扁平子目录 Text/
        const textFolder = zip.folder("Text");

        if (coverBlob) {
            zip.file(`cover.${coverExt}`, coverBlob);
        }

        let manifestItems = '';
        let spineItems = '';
        let htmlNavLinks = '';
        let ncxNavPoints = '';

        if (coverBlob) {
            manifestItems += `    <item id="cover-image" href="cover.${coverExt}" media-type="${coverType}" properties="cover-image" />\n`;
        }

        // 3. 构建全量章节 (采用绝对完美的 XHTML5 XML 自闭合约束标准)
        chapters.forEach((chap, index) => {
            const id = `chap_${index + 1}`;
            const hrefPath = `Text/${id}.xhtml`; // 统一后缀名防止阅读器底层混淆
            const safeTitle = escapeXml(chap.title);
            const safeContent = escapeXml(chap.content)
                .split('\n')
                .map(line => line.trim() ? `<p>${line.trim()}</p>` : '')
                .join('\n');

            // 【核心修正点】：这里的 <meta /> 必须自闭合！
            const htmlContent = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>${safeTitle}</title>
    <style type="text/css">
        h1 { text-align: center; margin-top: 2em; margin-bottom: 1em; font-size: 1.4em; }
        p { text-indent: 2em; line-height: 1.6; margin: 0.6em 0; font-size: 1.1em; }
    </style>
</head>
<body>
    <h1>${safeTitle}</h1>
    ${safeContent}
</body>
</html>`;

            textFolder.file(`${id}.xhtml`, htmlContent);

            manifestItems += `    <item id="${id}" href="${hrefPath}" media-type="application/xhtml+xml" />\n`;
            spineItems += `    <itemref idref="${id}" />\n`;
            htmlNavLinks += `        <li><a href="${hrefPath}">${safeTitle}</a></li>\n`;
            ncxNavPoints += `        <navPoint id="navpoint-${index + 1}" playOrder="${index + 1}">
            <navLabel><text>${safeTitle}</text></navLabel>
            <content src="${hrefPath}" />
        </navPoint>\n`;
        });

        // 4. 生成 ePUB 3.0 的唯一官方核心 HTML 导航文件 (nav.xhtml)，同样严格闭合
        const navHtmlContent = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>目录</title>
</head>
<body>
    <nav epub:type="toc" id="toc">
        <h1>目 录</h1>
        <ol>
${htmlNavLinks}        </ol>
    </nav>
</body>
</html>`;
        zip.file("nav.xhtml", navHtmlContent);

        const ncxContent = `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
    <head>
        <meta name="dtb:uid" content="${uuid}" />
        <meta name="dtb:depth" content="1" />
        <meta name="dtb:totalPageCount" content="0" />
        <meta name="dtb:maxPageNumber" content="0" />
    </head>
    <docTitle><text>${escapeXml(title)}</text></docTitle>
    <navMap>
${ncxNavPoints}    </navMap>
</ncx>`;
        zip.file("toc.ncx", ncxContent);

        // 5. 声明 properties="nav"，这是唤醒苹果底部系统原生目录的“最高权限指令”
        manifestItems = `    <item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav" />\n` +
            `    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml" />\n` + manifestItems;

        // 6. 生成没有任何语法漏洞的现代化 content.opf (根目录)
        const coverMeta = coverBlob ? `\n        <meta property="轄:cover-image">cover-image</meta>` : '';
        const contentOpf = `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" version="3.0">
    <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
        <dc:title>${escapeXml(title)}</dc:title>
        <dc:creator id="aut">${escapeXml(author)}</dc:creator>
        <dc:language>zh-CN</dc:language>
        <dc:identifier id="bookid">${uuid}</dc:identifier>
        <meta property="dcterms:modified">${new Date().toISOString().split('.')[0] + 'Z'}</meta>${coverMeta}
    </metadata>
    <manifest>
${manifestItems}    </manifest>
    <spine toc="ncx">
${spineItems}    </spine>
</package>`;
        zip.file("content.opf", contentOpf);

        // 7. 防 Safari 二进制拦截混淆导出
        const baseBlob = await zip.generateAsync({ type: "blob" });
        const blob = new Blob([baseBlob], { type: "application/octet-stream" });
        saveAs(blob, `${title}.epub.bin`);
    }
</script>
</body>
</html>
